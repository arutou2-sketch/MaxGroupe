<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Привязка контакта Wazzup к сделке amoCRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 50px auto;
      padding: 24px;
      background: #f5f6f8;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Привязать контакт Wazzup к сделке</h2>

    <label>ID сделки amoCRM</label>
    <input id="dealId" placeholder="Например: 56811525" />

    <label>ID контакта amoCRM / Wazzup</label>
    <input id="contactId" placeholder="Например: 74591307" />

    <button id="sendBtn">Привязать</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const N8N_WEBHOOK_URL = 'https://n8n.bot-assist.online/webhook/32d6d348-f941-4881-95f9-f84f039e460f';

    const btn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    btn.onclick = async () => {
      const deal_id = document.getElementById('dealId').value.trim();
      const contact_id = document.getElementById('contactId').value.trim();

      if (!deal_id || !contact_id) {
        statusEl.textContent = 'Ошибка: заполните ID сделки и ID контакта.';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Отправляю в n8n...';

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify({
            deal_id,
            contact_id
          })
        });

        const data = await res.json();

        if (!res.ok || data.success === false) {
          throw new Error(data.message || 'Ошибка n8n');
        }

        statusEl.textContent =
          'Готово ✅\n' +
          'Сделка amoCRM: ' + data.deal_id + '\n' +
          'Контакт amoCRM: ' + data.contact_id;

      } catch (e) {
        statusEl.textContent = 'Ошибка ❌\n' + e.message;
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
