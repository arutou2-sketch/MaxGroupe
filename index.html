<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Привязка контакта Wazzup к сделке amoCRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 560px;
      margin: 50px auto;
      padding: 24px;
      background: #f5f6f8;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 24px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Привязать контакт Wazzup к сделке</h2>

    <form id="bindForm" autocomplete="off">
      <label for="dealId">ID сделки amoCRM</label>
      <input
        id="dealId"
        name="deal_id"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />

      <label for="contactId">ID контакта amoCRM / Wazzup</label>
      <input
        id="contactId"
        name="contact_id"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />

      <label for="password">Пароль</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="new-password"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />

      <button id="sendBtn" type="submit">Привязать</button>

      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const N8N_WEBHOOK_URL = 'https://n8n.bot-assist.online/webhook/32d6d348-f941-4881-95f9-f84f039e460f';

    const form = document.getElementById('bindForm');
    const btn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    const dealInput = document.getElementById('dealId');
    const contactInput = document.getElementById('contactId');
    const passwordInput = document.getElementById('password');

    function onlyDigits(value) {
      return String(value || '').replace(/\D/g, '');
    }

    function clearInputs() {
      dealInput.value = '';
      contactInput.value = '';
      passwordInput.value = '';
    }

    window.addEventListener('load', clearInputs);
    window.addEventListener('pageshow', clearInputs);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const deal_id = onlyDigits(dealInput.value);
      const contact_id = onlyDigits(contactInput.value);
      const password = String(passwordInput.value || '').trim();

      if (!deal_id || !contact_id || !password) {
        statusEl.textContent = 'Ошибка ❌\nЗаполни ID сделки, ID контакта и пароль.';
        clearInputs();
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Отправляю в n8n...';

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          body: JSON.stringify({
            deal_id: deal_id,
            contact_id: contact_id,
            password: password
          })
        });

        const rawText = await res.text();

        let data = {};
        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch (e) {
          throw new Error('n8n вернул не JSON:\n' + rawText);
        }

        if (!res.ok || data.success === false) {
          throw new Error(data.message || data.error || 'Ошибка n8n');
        }

        statusEl.textContent =
          'Готово ✅\n' +
          'Сделка amoCRM: ' + data.deal_id + '\n' +
          'Контакт amoCRM: ' + data.contact_id;

        clearInputs();

      } catch (e) {
        statusEl.textContent =
          'Ошибка ❌\n' +
          e.message;

        clearInputs();

      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
